<!doctype html>
<html lang="zh-CN">
  <body style="margin:0;background:#f6f8fb;color:#111827;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;">
    <div style="max-width:560px;margin:0 auto;padding:32px 20px;">
      <div style="background:#ffffff;border:1px solid #e5e7eb;border-radius:12px;padding:28px;">
        <p style="margin:0 0 20px;color:#2563eb;font-size:14px;font-weight:700;letter-spacing:.04em;">HHWX</p>
        <h1 style="margin:0 0 16px;font-size:24px;line-height:1.3;color:#111827;">验证你的身份</h1>
        <p style="margin:0 0 18px;font-size:15px;line-height:1.7;color:#374151;">请使用下面的验证码继续当前操作。验证码会在短时间后失效。</p>
        <p style="margin:24px 0;padding:16px 18px;border-radius:10px;background:#f3f4f6;color:#111827;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:28px;font-weight:700;letter-spacing:.12em;text-align:center;">{{ .Token }}</p>
        <hr style="border:0;border-top:1px solid #e5e7eb;margin:0 0 24px;">
        <h2 style="margin:0 0 12px;font-size:20px;line-height:1.35;color:#111827;">Verify your identity</h2>
        <p style="margin:0 0 18px;font-size:15px;line-height:1.7;color:#374151;">Use the code above to continue your current action. The code expires shortly.</p>
        <p style="margin:0;font-size:13px;line-height:1.7;color:#6b7280;">If you did not request this, you can safely ignore this email.</p>
      </div>
    </div>
  </body>
</html>
