<!doctype html>
<html lang="zh-CN">
  <body style="margin:0;background:#f6f8fb;color:#111827;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;">
    <div style="max-width:560px;margin:0 auto;padding:32px 20px;">
      <div style="background:#ffffff;border:1px solid #e5e7eb;border-radius:12px;padding:28px;">
        <p style="margin:0 0 20px;color:#2563eb;font-size:14px;font-weight:700;letter-spacing:.04em;">HHWX</p>
        <h1 style="margin:0 0 16px;font-size:24px;line-height:1.3;color:#111827;">你已受邀加入 HHWX</h1>
        <p style="margin:0 0 18px;font-size:15px;line-height:1.7;color:#374151;">请点击下面的按钮接受邀请并创建账号。</p>
        <p style="margin:24px 0;">
          <a href="{{ .ConfirmationURL }}" style="display:inline-block;border-radius:8px;background:#2563eb;color:#ffffff;font-size:15px;font-weight:700;text-decoration:none;padding:12px 18px;">接受邀请 / Accept invitation</a>
        </p>
        <p style="margin:0 0 24px;font-size:13px;line-height:1.7;color:#6b7280;">如果按钮无法打开，请复制下面的链接到浏览器：</p>
        <p style="margin:0 0 28px;font-size:12px;line-height:1.6;word-break:break-all;color:#4b5563;">{{ .ConfirmationURL }}</p>
        <hr style="border:0;border-top:1px solid #e5e7eb;margin:0 0 24px;">
        <h2 style="margin:0 0 12px;font-size:20px;line-height:1.35;color:#111827;">You are invited to HHWX</h2>
        <p style="margin:0 0 18px;font-size:15px;line-height:1.7;color:#374151;">Click the button above to accept the invitation and create your account.</p>
        <p style="margin:0;font-size:13px;line-height:1.7;color:#6b7280;">If you did not expect this invitation, you can safely ignore this email.</p>
      </div>
    </div>
  </body>
</html>
